services:
  postgres:
    image: postgres:latest
    container_name: onedrive-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: onedrive
      POSTGRES_USER: onedrive
      POSTGRES_PASSWORD: onedrive_secret_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onedrive"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: onedrive-redis
    restart: unless-stopped
    command: redis-server --requirepass redis_secret_2026
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secret_2026", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: onedrive-onlyoffice
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      - JWT_ENABLED=false
      - ALLOW_PRIVATE_IP_ADDRESS=true
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data

volumes:
  postgres_data:
  redis_data:
  onlyoffice_data:

